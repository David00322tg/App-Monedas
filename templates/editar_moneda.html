<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar Moneda</title>

  <!-- ⚠️ ASEGÚRATE QUE ESTA RUTA ES CORRECTA -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos-editar.css') }}">
</head>

<body>

<div class="container">

  <h1>Editar Moneda</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="messages">
        {% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" enctype="multipart/form-data">

    <div class="form-grid">

      <div class="form-group">
        <label>Valor</label>
        <input type="text" name="valor" value="{{ moneda.valor }}">
      </div>

      <div class="form-group">
        <label>Tipo</label>
        <input type="text" name="tipo" value="{{ moneda.tipo }}">
      </div>

      <div class="form-group">
        <label>País</label>
        <input type="text" name="pais" value="{{ moneda.pais }}">
      </div>

      <div class="form-group">
        <label>Año</label>
        <input type="number" name="anio" value="{{ moneda.anio }}">
      </div>

    </div>

    <div class="form-group">
      <label>Rareza</label>
      <input type="text" name="rareza" value="{{ moneda.rareza }}">
    </div>

    <div class="form-group">
      <label>Historia</label>
      <textarea name="historia">{{ moneda.historia }}</textarea>
    </div>

    <div class="form-group">
      <label>Imagen</label>

      {% if moneda.imagen %}
        <img src="{{ moneda.imagen_url }}"
             class="img-preview"
             onclick="this.src = (this.src === this.dataset.frente) ? this.dataset.detras : this.dataset.frente;">
      {% endif %}

      <input type="file" name="imagen">
      <input type="file" name="imagen_detras">
    </div>

    <div class="buttons">
      <button type="submit">Guardar cambios</button>
      <a href="{{ url_for('index') }}" class="btn-cancelar">Cancelar</a>
    </div>

  </form>

</div>

</body>
</html>
